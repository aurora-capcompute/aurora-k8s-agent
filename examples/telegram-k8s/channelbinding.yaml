# Satisfies the brain's interface with one flat grant and wires it to the channel.
#
# Option A (used here): store the OpenAI key encrypted in this CRD under
# spec.secrets. The agent resolves and injects it as the named env var at
# bridge startup. Seal with:
#   printf %s "$OPENAI_API_KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
#
# Option B: omit spec.secrets and set OPENAI_API_KEY from a Kubernetes Secret
# via the chart's llmSecretKey/llmEnvVar values instead.
apiVersion: aurora.dev/v1alpha1
kind: ChannelBinding
metadata:
  name: ops-on-telegram
spec:
  brainRef: kubernetes-agent
  channelRef:
    kind: TelegramChannel
    name: ops
  systemPrompt: >-
    You are Aurora, a Kubernetes operator. Inspect current state before making
    changes, summarize intended mutations, and never read Secrets.
  secrets:
    OPENAI_API_KEY:
      type: inPlaceEncrypted
      ciphertext: ""   # paste output of: printf %s "$OPENAI_API_KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
  allowed:
    - name: openai.chat
      settings:
        base_url: https://api.openai.com/v1
        api_key_env: OPENAI_API_KEY   # resolved from spec.secrets above
        default_model: gpt-5.5
        allowed_models: [gpt-5.5]
        require_approval: false
    - name: k8s.get
      settings: {namespaces: [default]}
    - name: k8s.list
      settings: {namespaces: [default]}
    - name: k8s.logs
      settings: {namespaces: [default]}
    - name: k8s.events
      settings: {namespaces: [default]}
    - name: k8s.apply
      settings: {namespaces: [default], require_approval: true}
    - name: k8s.delete
      settings: {namespaces: [default], require_approval: true}
    - name: helm.list
      settings: {namespaces: [default]}
    - name: helm.status
      settings: {namespaces: [default]}
    - name: helm.get_values
      settings: {namespaces: [default]}
    - name: helm.upgrade
      settings: {namespaces: [default], require_approval: true}
    - name: helm.uninstall
      settings: {namespaces: [default], require_approval: true}
    - name: timer.set
      settings: {max_duration_ms: 86400000}
