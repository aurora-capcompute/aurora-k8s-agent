# The agent Secret. Create it (don't commit real values), then reference it via
# the chart's secretName. `secret-key` is required when the controller is enabled:
# it decrypts each Manifest's inPlaceEncrypted channel tokens and capability
# secrets via `aurora-k8s-agent seal-secret`.
#
# `openai-api-key` is optional here: if you seal the OpenAI API key directly in
# manifest.yaml (Option A), omit this entry. If you prefer to supply the key via a
# Kubernetes Secret env var (Option B), keep it and the chart will mount it as
# OPENAI_API_KEY in the agent pod.
apiVersion: v1
kind: Secret
metadata:
  name: aurora-secrets
  namespace: aurora
type: Opaque
stringData:
  task-secret: REPLACE_WITH_RANDOM_32_BYTES
  state-key: REPLACE_WITH_RANDOM_32_BYTES
  secret-key: REPLACE_WITH_RANDOM_32_BYTES
  # openai-api-key: REPLACE_WITH_OPENAI_API_KEY  # only needed for Option B
