# The agent Secret. Create it (don't commit real values), then reference it via
# the chart's secretName. `secret-key` is required when the controller is enabled:
# it decrypts each channel's inPlaceEncrypted token (and seals them via
# `aurora-k8s-agent seal-secret`).
apiVersion: v1
kind: Secret
metadata:
  name: aurora-secrets
  namespace: aurora
type: Opaque
stringData:
  task-secret: REPLACE_WITH_RANDOM_32_BYTES
  state-key: REPLACE_WITH_RANDOM_32_BYTES
  secret-key: REPLACE_WITH_RANDOM_32_BYTES
  openai-api-key: REPLACE_WITH_OPENAI_API_KEY
