# Seal the bot token with the cluster's secret-key (the same one in the agent
# Secret, see secret.example.yaml):
#   printf %s "$TELEGRAM_BOT_TOKEN" | AURORA_SECRET_KEY=<secret-key> \
#     aurora-k8s-agent seal-secret
# and paste the output as the ciphertext below.
apiVersion: aurora.dev/v1alpha1
kind: TelegramChannel
metadata:
  name: ops
spec:
  botToken:
    type: inPlaceEncrypted
    ciphertext: REPLACE_WITH_SEALED_TELEGRAM_BOT_TOKEN
  users: ["42"]   # Telegram numeric user ids allowed to talk to the bot
  scopes: ["42"]  # Telegram chat ids the bot serves
