# One Manifest fully describes the agent: its inlined brain, the channels it
# serves (each carrying its own encrypted token and native subjects), and its
# capability tree.
#
# The brain artifact is loaded from an OCI layout baked into the agent image at
# /brains/kubernetes-agent (see Dockerfile) — no registry required. To pull from
# a registry instead, set brain.artifact to a normal ref, e.g.
#   artifact: ghcr.io/you/brain-k8s:1.0
#
# Seal each secret with the cluster's secret-key (the same one in the agent
# Secret, see secret.example.yaml):
#   printf %s "$SECRET" | AURORA_SECRET_KEY=<secret-key> aurora-k8s-agent seal-secret
# and paste the output as the ciphertext below.
apiVersion: aurora.dev/v1alpha1
kind: Manifest
metadata:
  name: ops-on-telegram
spec:
  brain:
    artifact: oci-layout:/brains/kubernetes-agent:latest
  channels:
    - kind: TelegramChannel
      name: ops
      telegram:
        botToken:
          type: inPlaceEncrypted
          ciphertext: REPLACE_WITH_SEALED_TELEGRAM_BOT_TOKEN
        users: ["42"]   # Telegram numeric user ids allowed to talk to the bot
        scopes: ["42"]  # Telegram chat ids the bot serves
  systemPrompt:
    type: literal
    value: >-
      You are Aurora, a Kubernetes operator. Inspect current state before making
      changes, summarize intended mutations, and never read Secrets.
  # Unified tool composition: each tool has a name (the brain's routing handle),
  # a type (which dispatcher), and settings. The LLM is an ordinary tool marked
  # hidden so it stays off the brain's discoverable menu. k8s/helm each expose a
  # single tool whose `permissions` allowlist gates the verbs the brain may use;
  # mutating verbs (apply/delete/upgrade/uninstall) require approval by default.
  tools:
    - name: llm
      type: core.openaiApi
      hidden: true
      settings:
        base_url:
          type: literal
          value: "https://api.openai.com/v1"
        api_key:
          type: inPlaceEncrypted
          ciphertext: ""    # paste output of: printf %s "$OPENAI_API_KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
        default_model:
          type: literal
          value: "gpt-4.1"
        allowed_models:
          type: literal
          value: ["gpt-4.1"]
    - name: cluster
      type: core.k8s
      settings:
        permissions:
          type: literal
          value:
            - {resource: "*", verb: get, namespace: default}
            - {resource: "*", verb: list, namespace: default}
            - {resource: "*", verb: logs, namespace: default}
            - {resource: "*", verb: events, namespace: default}
            - {resource: "*", verb: apply, namespace: default}
            - {resource: "*", verb: delete, namespace: default}
    - name: releases
      type: core.helm
      settings:
        permissions:
          type: literal
          value:
            - {verb: list, namespace: default}
            - {verb: status, namespace: default}
            - {verb: get_values, namespace: default}
            - {resource: "*", verb: upgrade, namespace: default}
            - {resource: "*", verb: uninstall, namespace: default}
    - name: timer
      type: core.timer
      settings:
        max_duration_ms: {type: literal, value: 86400000}
