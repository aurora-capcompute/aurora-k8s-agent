# The binding satisfies the brain's interface with one flat grant and wires the
# brain to the channel. `allowed` is the ceiling: every required brain capability
# (openai.chat) must appear, and the operational tools are scoped here.
#
# The LLM key can be supplied two ways:
#   A) Set it in spec.secrets (encrypted in this CRD, injected as an env var at
#      bridge startup). Seal: printf %s "$KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
#   B) Set OPENAI_API_KEY in the environment directly (e.g. via .env or Docker).
# The local example uses option B — no spec.secrets block is needed.
apiVersion: aurora.dev/v1alpha1
kind: ChannelBinding
metadata:
  name: ops-on-telegram
spec:
  brainRef: kubernetes-agent
  channelRef:
    kind: TelegramChannel
    name: ops
  systemPrompt: >-
    You are Aurora, a Kubernetes operator. Inspect current state before making
    changes, summarize intended mutations, and never read Secrets.
  allowed:
    - name: openai.chat
      settings:
        base_url: https://api.openai.com/v1
        api_key_env: OPENAI_API_KEY
        default_model: gpt-5.5
        allowed_models: [gpt-5.5]
        require_approval: false
    - name: k8s.get
      settings: {namespaces: [default]}
    - name: k8s.list
      settings: {namespaces: [default]}
    - name: k8s.logs
      settings: {namespaces: [default]}
    - name: k8s.events
      settings: {namespaces: [default]}
    - name: k8s.apply
      settings: {namespaces: [default], require_approval: true}
    - name: k8s.delete
      settings: {namespaces: [default], require_approval: true}
    - name: helm.list
      settings: {namespaces: [default]}
    - name: helm.status
      settings: {namespaces: [default]}
    - name: helm.get_values
      settings: {namespaces: [default]}
    - name: helm.upgrade
      settings: {namespaces: [default], require_approval: true}
    - name: helm.uninstall
      settings: {namespaces: [default], require_approval: true}
    - name: timer.set
      settings: {max_duration_ms: 86400000}
