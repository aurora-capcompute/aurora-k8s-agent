# The binding declares the capability tree and wires the brain to the channel.
# Capability settings use the SettingValue ADT: { type, value/ciphertext }.
# Set your LLM key as a literal value, or use type: inPlaceEncrypted with a
# sealed ciphertext:  printf %s "$KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
apiVersion: aurora.dev/v1alpha1
kind: ChannelBinding
metadata:
  name: ops-on-telegram
spec:
  brainRef: kubernetes-agent
  channels:
    - kind: TelegramChannel
      name: ops
  systemPrompt:
    type: literal
    value: >-
      You are Aurora, a Kubernetes operator. Inspect current state before making
      changes, summarize intended mutations, and never read Secrets.
  capabilities:
    - name: openai.chat
      settings:
        base_url:
          type: literal
          value: "https://api.openai.com/v1"
        api_key:
          type: literal
          value: "your-api-key"    # or: type: inPlaceEncrypted / ciphertext: <sealed>
        default_model:
          type: literal
          value: "gpt-4.1"
        allowed_models:
          type: literal
          value: ["gpt-4.1"]
        require_approval:
          type: literal
          value: false
    - name: k8s.get
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.list
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.logs
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.events
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.apply
      optional: true
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: k8s.delete
      optional: true
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: helm.list
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.status
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.get_values
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.upgrade
      optional: true
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: helm.uninstall
      optional: true
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: timer.set
      optional: true
      settings:
        max_duration_ms: {type: literal, value: 86400000}
