# The Telegram transport plus its native subjects and its own encrypted token.
# run.sh seals $TELEGRAM_BOT_TOKEN with $AURORA_SECRET_KEY into __SEALED_TOKEN__,
# and fills the allowed user/chat ids from $TELEGRAM_USER_ID / $TELEGRAM_CHAT_ID.
apiVersion: aurora.dev/v1alpha1
kind: TelegramChannel
metadata:
  name: ops
spec:
  botToken:
    type: inPlaceEncrypted
    ciphertext: __SEALED_TOKEN__
  users: ["__TELEGRAM_USER_ID__"]   # Telegram numeric user ids allowed to talk
  scopes: ["__TELEGRAM_CHAT_ID__"]  # Telegram chat ids the bot serves
