# One Manifest fully describes the agent: its inlined brain, the channels it
# serves (each carrying its own encrypted token and native subjects), and its
# capability tree. run.sh rewrites the __PLACEHOLDERS__ below:
#   __BRAIN_LAYOUT__       absolute path to the on-disk OCI layout (registry-less)
#   __SEALED_TOKEN__       $TELEGRAM_BOT_TOKEN sealed with $AURORA_SECRET_KEY
#   __TELEGRAM_USER_ID__   numeric user id allowed to talk to the bot
#   __TELEGRAM_CHAT_ID__   chat id the bot serves
# Capability settings use the SettingValue ADT: { type, value/ciphertext }. Set
# your LLM key as a literal value, or use type: inPlaceEncrypted with a sealed
# ciphertext:  printf %s "$KEY" | AURORA_SECRET_KEY=<key> aurora-k8s-agent seal-secret
apiVersion: aurora.dev/v1alpha1
kind: Manifest
metadata:
  name: ops-on-telegram
spec:
  brain:
    # Registry-less on-disk OCI layout. In k8s you would instead bake the layout
    # into the image (see ../../telegram-k8s) or use a normal registry ref.
    artifact: oci-layout:__BRAIN_LAYOUT__:latest
  channels:
    - kind: TelegramChannel
      name: ops
      telegram:
        botToken:
          type: inPlaceEncrypted
          ciphertext: __SEALED_TOKEN__
        users: ["__TELEGRAM_USER_ID__"]   # Telegram numeric user ids allowed to talk
        scopes: ["__TELEGRAM_CHAT_ID__"]  # Telegram chat ids the bot serves
  systemPrompt:
    type: literal
    value: >-
      You are Aurora, a Kubernetes operator. Inspect current state before making
      changes, summarize intended mutations, and never read Secrets.
  capabilities:
    - name: openai.chat
      settings:
        base_url:
          type: literal
          value: "https://api.openai.com/v1"
        api_key:
          type: literal
          value: "your-api-key"    # or: type: inPlaceEncrypted / ciphertext: <sealed>
        default_model:
          type: literal
          value: "gpt-4.1"
        allowed_models:
          type: literal
          value: ["gpt-4.1"]
        require_approval:
          type: literal
          value: false
    - name: k8s.get
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.list
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.logs
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.events
      settings:
        namespaces: {type: literal, value: [default]}
    - name: k8s.apply
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: k8s.delete
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: helm.list
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.status
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.get_values
      settings:
        namespaces: {type: literal, value: [default]}
    - name: helm.upgrade
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: helm.uninstall
      settings:
        namespaces: {type: literal, value: [default]}
        require_approval: {type: literal, value: true}
    - name: timer.set
      settings:
        max_duration_ms: {type: literal, value: 86400000}
