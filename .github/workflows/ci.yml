name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
      - uses: azure/setup-helm@v4
        with:
          version: v4.1.3
      - run: sh brain/build.sh
      - run: go test -race ./...
      - run: go vet ./...
      - run: >-
          helm lint charts/aurora-k8s-agent
          --set secrets.telegramBotToken=test
          --set secrets.taskSecret=test-task-secret
          --set secrets.stateKey=test-state-key
          --set secrets.llmAPIKey=test
      - run: >-
          helm template aurora charts/aurora-k8s-agent
          --set secrets.telegramBotToken=test
          --set secrets.taskSecret=test-task-secret
          --set secrets.stateKey=test-state-key
          --set secrets.llmAPIKey=test
          > /tmp/rendered.yaml

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aurora-k8s-agent:ci
          platforms: linux/amd64

  kind-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: helm/kind-action@v1
        with:
          install_only: true
      - uses: azure/setup-helm@v4
        with:
          version: v4.1.3
      - run: sh scripts/kind-smoke.sh
