name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
      - uses: azure/setup-helm@v4
        with:
          version: v4.1.3
      # The agent embeds no brain; this builds the example brain so it can't rot.
      - run: sh examples/brain/build.sh
      - run: go test -race ./...
      - run: go vet ./...
      - run: >-
          helm lint charts/aurora-k8s-agent
          --set secretName=test-secret
      - run: >-
          helm template aurora charts/aurora-k8s-agent
          --set secretName=test-secret
          > /tmp/rendered.yaml
      - run: >-
          helm lint charts/aurora-k8s-agent
          --set secretName=test-secret
          --set controller.enabled=true
      - run: >-
          helm template aurora charts/aurora-k8s-agent
          --set secretName=test-secret
          --set controller.enabled=true
          > /tmp/rendered-controller.yaml
      - run: helm lint ui/chart
      - run: helm template aurora-ui ui/chart > /tmp/rendered-ui.yaml

  ui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      # tsc + vite build is the typecheck/build gate for the SPA.
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      # Publish only for pushes to main; pull requests build for validation
      # without pushing (and forks lack package write permission anyway).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aurora-k8s-agent
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=sha-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ui-container:
    runs-on: ubuntu-latest
    needs: ui-build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Publish only for pushes to main; pull requests build for validation
      # without pushing.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aurora-ui
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./ui
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kind-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: helm/kind-action@v1
        with:
          install_only: true
      - uses: azure/setup-helm@v4
        with:
          version: v4.1.3
      - run: sh scripts/kind-smoke.sh
