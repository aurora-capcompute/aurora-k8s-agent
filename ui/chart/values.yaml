image:
  repository: ghcr.io/aurora-capcompute/aurora-ui
  tag: ""
  pullPolicy: IfNotPresent

replicas: 1

# The agent API Service the UI proxies /api to (host:port). Typically the agent
# release's API Service, e.g. "<agent-release>-api:80".
apiUpstream: aurora-api:80

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aurora-ui.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
