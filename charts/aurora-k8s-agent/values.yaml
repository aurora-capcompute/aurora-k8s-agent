image:
  repository: ghcr.io/aurora-capcompute/aurora-k8s-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # Roles and RoleBindings are created in every listed namespace.
  targetNamespaces:
    - default
  # Cluster-scoped access is deliberately disabled by default.
  clusterWide: false

policy:
  # Keys are Telegram numeric user IDs represented as strings.
  users:
    "123456789":
      allowed_chats:
        - 123456789
      manifest:
        version: 2
        brain: kubernetes-agent
        system_prompt: >-
          You are Aurora, a Kubernetes operator. Inspect current state before
          making changes. Summarize intended mutations. Never read Secrets.
          Delegate read-only reconnaissance to your child brains when useful.
        capabilities:
          - name: openai.chat
            hidden: true
            settings:
              base_url: https://api.openai.com/v1
              api_key_env: OPENAI_API_KEY
              default_model: gpt-5.5
              allowed_models: [gpt-5.5]
              require_approval: false
          - name: k8s.get
            settings: {namespaces: [default]}
          - name: k8s.list
            settings: {namespaces: [default]}
          - name: k8s.logs
            settings: {namespaces: [default]}
          - name: k8s.events
            settings: {namespaces: [default]}
          - name: k8s.apply
            settings: {namespaces: [default], require_approval: true}
          - name: k8s.delete
            settings: {namespaces: [default], require_approval: true}
          - name: helm.list
            settings: {namespaces: [default]}
          - name: helm.status
            settings: {namespaces: [default]}
          - name: helm.get_values
            settings: {namespaces: [default]}
          - name: helm.upgrade
            settings: {namespaces: [default], require_approval: true}
          - name: helm.uninstall
            settings: {namespaces: [default], require_approval: true}
        children:
          - name: k8s-scout
            brain: kubernetes-agent
            system_prompt: >-
              You are a Kubernetes read-only scout. Gather information about
              resources, pods, logs, and events. Report findings concisely.
              Do not attempt mutations.
            capabilities:
              - name: openai.chat
            hidden: true
                settings:
                  base_url: https://api.openai.com/v1
                  api_key_env: OPENAI_API_KEY
                  default_model: gpt-5.5
                  allowed_models: [gpt-5.5]
              - name: k8s.get
                settings: {namespaces: [default]}
              - name: k8s.list
                settings: {namespaces: [default]}
              - name: k8s.logs
                settings: {namespaces: [default]}
              - name: k8s.events
                settings: {namespaces: [default]}
          - name: helm-scout
            brain: kubernetes-agent
            system_prompt: >-
              You are a Helm read-only scout. List releases, check statuses,
              and inspect values. Report findings concisely. Do not install,
              upgrade, or uninstall releases.
            capabilities:
              - name: openai.chat
            hidden: true
                settings:
                  base_url: https://api.openai.com/v1
                  api_key_env: OPENAI_API_KEY
                  default_model: gpt-5.5
                  allowed_models: [gpt-5.5]
              - name: helm.list
                settings: {namespaces: [default]}
              - name: helm.status
                settings: {namespaces: [default]}
              - name: helm.get_values
                settings: {namespaces: [default]}

# Secret must contain: telegram-bot-token, task-secret, state-key,
# and the LLM API key under the key named by llmSecretKey.
secretName: ""
llmSecretKey: openai-api-key
llmEnvVar: OPENAI_API_KEY

persistence:
  enabled: true
  storageClass: ""
  accessModes: [ReadWriteOnce]
  size: 2Gi

podAnnotations: {}
podLabels: {}
podSecurityContext:
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

networkPolicy:
  enabled: false

podDisruptionBudget:
  enabled: true

extraEnv: []
