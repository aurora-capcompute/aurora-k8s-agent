image:
  repository: ghcr.io/aurora-capcompute/aurora-k8s-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Registry auth for pulling brains from private OCI registries. The password is
# read from the Secret under `passwordKey`. Not needed when brains are baked into
# the agent image as OCI layouts.
registry:
  username: ""
  passwordKey: registry-password

# Control-plane controller: watch Brain, the typed channels (SlackChannel,
# TelegramChannel, WebChannel) and ChannelBinding CRDs and reconcile them into
# runtime config. When enabled the controller owns the chat channels — a
# supervisor builds one live bridge per channel CRD, decrypting each channel's
# inPlaceEncrypted token with `secret-key` from the Secret (see secretName).
# Installs the CRDs and grants RBAC to watch them. Requires rbac.create.
controller:
  enabled: true
  namespace: ""         # watch scope; empty = all namespaces

# Communication channels for the legacy NO-control-plane path only
# (controller.enabled=false). With controller.enabled=true (the default) this is
# ignored: channels come from typed channel CRDs and the supervisor instead.
# One or more of: telegram, slack. Set to [] for headless (API/UI-only).
# - telegram: Secret must contain `telegram-bot-token`.
# - slack: Secret must contain `slack-app-token` and `slack-bot-token`.
channels: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # Roles and RoleBindings are created in every listed namespace.
  targetNamespaces:
    - default
  # Cluster-scoped access is deliberately disabled by default.
  clusterWide: false

# Secret must contain: task-secret, state-key, the LLM API key under the key
# named by llmSecretKey, and `secret-key` (the key that decrypts channel
# `inPlaceEncrypted` credentials — seal a channel token with the same key via
# `aurora-k8s-agent seal-secret`). Without `secret-key` the agent runs but
# starts no channel bridges.
secretName: ""
llmSecretKey: openai-api-key
llmEnvVar: OPENAI_API_KEY

persistence:
  enabled: true
  storageClass: ""
  accessModes: [ReadWriteOnce]
  size: 2Gi

podAnnotations: {}
podLabels: {}
podSecurityContext:
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Read-only execution-graph HTTP API (GET /api/threads, /api/threads/{id}/graph,
# /api/runs/{id}/graph, /api/runs/{id}/journal) on its own port, separate from the
# health/probe port, so a UI can roam the run history.
api:
  enabled: true
  port: 8081

# ClusterIP Service fronting the API port. Set type to LoadBalancer/NodePort to
# expose outside the cluster, or use the Ingress below.
service:
  type: ClusterIP
  port: 80

# Optional Ingress for the API Service.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aurora.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false
  # Ingress 'from' peers allowed to reach the API port (e.g. the namespace/pod
  # serving the UI). Empty allows all sources on the API port.
  apiAllowFrom: []

podDisruptionBudget:
  enabled: true

extraEnv: []
