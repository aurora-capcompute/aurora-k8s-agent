{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aurora-k8s-agent.fullname" . }}
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  telegram-bot-token: {{ required "secrets.telegramBotToken is required" .Values.secrets.telegramBotToken | quote }}
  task-secret: {{ required "secrets.taskSecret is required" .Values.secrets.taskSecret | quote }}
  state-key: {{ required "secrets.stateKey is required" .Values.secrets.stateKey | quote }}
  {{ .Values.secrets.llmAPIKeyKey }}: {{ required "secrets.llmAPIKey is required" .Values.secrets.llmAPIKey | quote }}
{{- end }}
