{{- if and .Values.controller.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-controller
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["aurora.dev"]
    resources: ["brains", "slackchannels", "telegramchannels", "webchannels", "channelbindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aurora.dev"]
    resources: ["brains/status", "slackchannels/status", "telegramchannels/status", "webchannels/status", "channelbindings/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-controller
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aurora-k8s-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-controller
{{- end }}
