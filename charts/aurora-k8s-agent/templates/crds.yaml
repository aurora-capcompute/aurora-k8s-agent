apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: channelbindings.aurora.dev
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
spec:
  group: aurora.dev
  scope: Namespaced
  names:
    kind: ChannelBinding
    plural: channelbindings
    singular: channelbinding
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Brain
          type: string
          jsonPath: .spec.brainRef
        - name: Channel
          type: string
          jsonPath: .spec.channelRef.name
        - name: Ready
          type: boolean
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [brainRef, channelRef, allowed]
              properties:
                brainRef:
                  type: string
                channelRef:
                  type: object
                  required: [kind, name]
                  properties:
                    kind:
                      type: string
                      enum: [SlackChannel, TelegramChannel, WebChannel]
                    name:
                      type: string
                systemPrompt:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [literal, inPlaceEncrypted, secretStorage]
                    value:
                      x-kubernetes-preserve-unknown-fields: true
                    ciphertext:
                      type: string
                    ref:
                      type: object
                      properties:
                        name: {type: string}
                        key: {type: string}
                allowed:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      settings:
                        type: object
                        additionalProperties:
                          type: object
                          required: [type]
                          properties:
                            type:
                              type: string
                              enum: [literal, inPlaceEncrypted, secretStorage]
                            value:
                              x-kubernetes-preserve-unknown-fields: true
                            ciphertext:
                              type: string
                            ref:
                              type: object
                              properties:
                                name: {type: string}
                                key: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
{{- end }}
