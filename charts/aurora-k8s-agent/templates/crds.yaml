{{- if .Values.controller.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: brains.aurora.dev
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
spec:
  group: aurora.dev
  scope: Namespaced
  names:
    kind: Brain
    plural: brains
    singular: brain
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Artifact
          type: string
          jsonPath: .spec.artifact
        - name: Ready
          type: boolean
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [artifact]
              properties:
                artifact:
                  type: string
                pullSecretRef:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: slackchannels.aurora.dev
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
spec:
  group: aurora.dev
  scope: Namespaced
  names:
    kind: SlackChannel
    plural: slackchannels
    singular: slackchannel
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [appToken, botToken, users, scopes]
              properties:
                appToken:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [inPlaceEncrypted, secretStorage]
                    ciphertext:
                      type: string
                    ref:
                      type: object
                      properties:
                        name: { type: string }
                        key: { type: string }
                botToken:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [inPlaceEncrypted, secretStorage]
                    ciphertext:
                      type: string
                    ref:
                      type: object
                      properties:
                        name: { type: string }
                        key: { type: string }
                users:
                  type: array
                  items: { type: string }
                scopes:
                  type: array
                  items: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
