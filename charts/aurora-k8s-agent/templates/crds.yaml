{{- if .Values.controller.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: manifests.aurora.dev
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
spec:
  group: aurora.dev
  scope: Namespaced
  names:
    kind: Manifest
    plural: manifests
    singular: manifest
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Brain
          type: string
          jsonPath: .spec.brain.artifact
        - name: Ready
          type: boolean
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [brain, channels, capabilities]
              properties:
                brain:
                  type: object
                  required: [artifact]
                  properties:
                    artifact:
                      type: string
                    pullSecretRef:
                      type: string
                channels:
                  type: array
                  items:
                    type: object
                    required: [kind, name]
                    properties:
                      kind:
                        type: string
                        enum: [SlackChannel, TelegramChannel, WebChannel]
                      name:
                        type: string
                      slack:
                        type: object
                        required: [appToken, botToken, users, scopes]
                        properties:
                          appToken:
                            type: object
                            required: [type]
                            properties:
                              type:
                                type: string
                                enum: [inPlaceEncrypted, secretStorage]
                              ciphertext:
                                type: string
                              ref:
                                type: object
                                properties:
                                  name: { type: string }
                                  key: { type: string }
                          botToken:
                            type: object
                            required: [type]
                            properties:
                              type:
                                type: string
                                enum: [inPlaceEncrypted, secretStorage]
                              ciphertext:
                                type: string
                              ref:
                                type: object
                                properties:
                                  name: { type: string }
                                  key: { type: string }
                          users:
                            type: array
                            items: { type: string }
                          scopes:
                            type: array
                            items: { type: string }
                      telegram:
                        type: object
                        required: [botToken, users, scopes]
                        properties:
                          botToken:
                            type: object
                            required: [type]
                            properties:
                              type:
                                type: string
                                enum: [inPlaceEncrypted, secretStorage]
                              ciphertext:
                                type: string
                              ref:
                                type: object
                                properties:
                                  name: { type: string }
                                  key: { type: string }
                          users:
                            type: array
                            items: { type: string }
                          scopes:
                            type: array
                            items: { type: string }
                      web:
                        type: object
                        properties:
                          token:
                            type: object
                            required: [type]
                            properties:
                              type:
                                type: string
                                enum: [inPlaceEncrypted, secretStorage]
                              ciphertext:
                                type: string
                              ref:
                                type: object
                                properties:
                                  name: { type: string }
                                  key: { type: string }
                          users:
                            type: array
                            items:
                              type: object
                              required: [name, password]
                              properties:
                                name:
                                  type: string
                                password:
                                  type: object
                                  required: [type]
                                  properties:
                                    type:
                                      type: string
                                      enum: [inPlaceEncrypted, secretStorage]
                                    ciphertext:
                                      type: string
                                    ref:
                                      type: object
                                      properties:
                                        name: { type: string }
                                        key: { type: string }
                          scopes:
                            type: array
                            items: { type: string }
                systemPrompt:
                  type: object
                  required: [type]
                  properties:
                    type:
                      type: string
                      enum: [literal, inPlaceEncrypted, secretStorage]
                    value:
                      x-kubernetes-preserve-unknown-fields: true
                    ciphertext:
                      type: string
                    ref:
                      type: object
                      properties:
                        name: { type: string }
                        key: { type: string }
                capabilities:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      settings:
                        type: object
                        additionalProperties:
                          type: object
                          required: [type]
                          properties:
                            type:
                              type: string
                              enum: [literal, inPlaceEncrypted, secretStorage]
                            value:
                              x-kubernetes-preserve-unknown-fields: true
                            ciphertext:
                              type: string
                            ref:
                              type: object
                              properties:
                                name: { type: string }
                                key: { type: string }
                children:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
{{- end }}
