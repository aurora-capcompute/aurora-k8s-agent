apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
data:
  # Either the legacy per-channel form (policy.users) or the named-manifest
  # bindings form (policy.manifests + policy.bindings) may be supplied; the agent
  # auto-detects. When bindings are present the whole policy document is rendered
  # verbatim, so it must include `version: 2`.
  policy.json: |
    {{- if .Values.policy.bindings }}
    {{ omit .Values.policy "users" | toJson | nindent 4 }}
    {{- else }}
    {{ dict "version" 1 "users" .Values.policy.users | toJson | nindent 4 }}
    {{- end }}
