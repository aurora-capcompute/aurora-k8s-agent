apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "aurora-k8s-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "aurora-k8s-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aurora-k8s-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/policy: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "aurora-k8s-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: AURORA_POLICY_PATH
              value: /etc/aurora/policy.json
            - name: AURORA_DATA_DIR
              value: /data
            - name: AURORA_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: AURORA_SOURCES
              value: {{ if .Values.channels }}{{ join "," .Values.channels | quote }}{{ else }}"none"{{ end }}
            {{- if has "telegram" .Values.channels }}
            - name: TELEGRAM_BOT_TOKEN_FILE
              value: /var/run/aurora-secrets/telegram-bot-token
            {{- end }}
            {{- if has "slack" .Values.channels }}
            - name: SLACK_APP_TOKEN_FILE
              value: /var/run/aurora-secrets/slack-app-token
            - name: SLACK_BOT_TOKEN_FILE
              value: /var/run/aurora-secrets/slack-bot-token
            {{- end }}
            {{- if .Values.brains }}
            - name: AURORA_BRAINS
              value: {{ join "," .Values.brains | quote }}
            {{- if .Values.brainDefault }}
            - name: AURORA_BRAIN_DEFAULT
              value: {{ .Values.brainDefault | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.registry.username }}
            - name: AURORA_REGISTRY_USERNAME
              value: {{ .Values.registry.username | quote }}
            - name: AURORA_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora-k8s-agent.secretName" . }}
                  key: {{ .Values.registry.passwordKey }}
            {{- end }}
            {{- if .Values.controller.enabled }}
            - name: AURORA_CONTROLLER
              value: "true"
            - name: AURORA_CONTROLLER_NAMESPACE
              value: {{ .Values.controller.namespace | quote }}
            {{- end }}
            - name: AURORA_API_ADDR
              value: {{ if .Values.api.enabled }}{{ printf ":%v" .Values.api.port | quote }}{{ else }}""{{ end }}
            - name: AURORA_TASK_SECRET_FILE
              value: /var/run/aurora-secrets/task-secret
            - name: AURORA_STATE_KEY_FILE
              value: /var/run/aurora-secrets/state-key
            {{- if .Values.controller.enabled }}
            # Key that decrypts channel "inPlaceEncrypted" secrets (and that
            # `aurora-k8s-agent seal-secret` uses to produce them).
            - name: AURORA_SECRET_KEY_FILE
              value: /var/run/aurora-secrets/secret-key
            {{- end }}
            - name: {{ .Values.llmEnvVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora-k8s-agent.secretName" . }}
                  key: {{ .Values.llmSecretKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8080
            {{- if .Values.api.enabled }}
            - name: api
              containerPort: {{ .Values.api.port }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: /etc/aurora
              readOnly: true
            - name: secrets
              mountPath: /var/run/aurora-secrets
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: policy
          configMap:
            name: {{ .Release.Name }}
        - name: secrets
          secret:
            secretName: {{ include "aurora-k8s-agent.secretName" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
